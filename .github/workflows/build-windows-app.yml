name: Build Windows caption-sync app

on:
  workflow_dispatch:
  push:
    branches:
      - claude/dafeomi-caption-highlighting-ikebz6
    paths:
      - 'MDYsync/tools/caption-sync/**'
      - '.github/workflows/build-windows-app.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install opencv-python-headless pytesseract rapidfuzz customtkinter pyinstaller

      - name: Install Tesseract OCR
        run: choco install tesseract -y --no-progress

      - name: Add Hebrew language data
        shell: pwsh
        run: |
          $tessdata = 'C:\Program Files\Tesseract-OCR\tessdata'
          Invoke-WebRequest `
            -Uri 'https://github.com/tesseract-ocr/tessdata_best/raw/main/heb.traineddata' `
            -OutFile "$tessdata\heb.traineddata"

      - name: Build executable
        shell: pwsh
        working-directory: MDYsync/tools/caption-sync
        run: |
          pyinstaller --noconfirm --windowed --noupx --collect-all customtkinter `
            --name DafSyncCaptionSync gui_app.py

      - name: Bundle Tesseract and the tractate index with the app
        shell: pwsh
        working-directory: MDYsync/tools/caption-sync
        run: |
          Copy-Item -Recurse 'C:\Program Files\Tesseract-OCR' dist\DafSyncCaptionSync\tesseract
          & dist\DafSyncCaptionSync\tesseract\tesseract.exe --list-langs
          Copy-Item talmud_index.json dist\DafSyncCaptionSync\talmud_index.json

      - name: Zip app
        shell: pwsh
        working-directory: MDYsync/tools/caption-sync
        run: Compress-Archive -Path dist\DafSyncCaptionSync -DestinationPath DafSync-Caption-Sync-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DafSync-Caption-Sync-windows
          path: MDYsync/tools/caption-sync/DafSync-Caption-Sync-windows.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: caption-sync-v0.2.0
          name: DafSync Caption Sync for Windows v0.2.0
          body: |
            Desktop app that converts a Daf Yomi lecture video's burned-in
            highlighted caption box into a DafSync word-level alignment.

            Download `DafSync-Caption-Sync-windows.zip`, extract it anywhere,
            and run `DafSyncCaptionSync.exe` inside the extracted folder.
            Python, OpenCV, Tesseract (with Hebrew), and CustomTkinter are
            bundled — nothing else to install.

            **v0.2.0**: New look and a click-based reading picker.
            - Redesigned interface (CustomTkinter): card-based layout,
              light/dark mode follows your system setting, scrolls to fit
              any window size.
            - No more typing Sefaria references. Pick the tractate, daf
              (page), and amud (a/b side) from dropdowns, then click
              "+ Add reading" to build the ordered list of readings the
              video covers — supports multiple dapim/amudim per video.
              The tractate/daf/amud data is generated from Sefaria's own
              pagination, including known exceptions (e.g. Nazir 33b, a
              genuinely missing page, is correctly left out of the picker).
            - Note: Shekalim is not included in the picker, since the
              Daf Yomi cycle uses the Jerusalem Talmud for that tractate,
              which has different pagination than the other 36 tractates.

            **If Windows shows "Failed to load Python DLL ... Access is
            denied"**: right-click the downloaded zip → Properties → check
            "Unblock" → Apply, then re-extract and run again. Windows flags
            downloaded files this way, and it can block a bundled DLL from
            loading until unblocked. This build also disables UPX
            compression, which antivirus tools sometimes mistake for
            malware packing.
          files: MDYsync/tools/caption-sync/DafSync-Caption-Sync-windows.zip
